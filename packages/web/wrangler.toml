# Cloudflare Pages 配置
# 用于将前端部署到 Cloudflare Pages

name = "nbins-web"
compatibility_date = "2026-04-03"
pages_build_output_dir = "dist"

# 构建配置
[build]
command = "pnpm build"
watch_dir = "src"

# 环境变量（生产环境）
# 在 Cloudflare Dashboard 中配置，或使用 wrangler secret
[vars]
# API 地址将在 Cloudflare Dashboard 中配置
# VITE_NBINS_API_BASE_URL = "https://nbins-api.your-account.workers.dev"

# 开发环境配置
[dev]
port = 5173
local_protocol = "http"
